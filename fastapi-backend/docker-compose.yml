version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # HOST_PORT:CONTAINER_PORT
      # Change the left side freely — it's only for external access (psql, DBeaver).
      # The right side (5432) is fixed — it's what Postgres listens on inside the container.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    image: liveness-sdk-backend:latest   # explicit name — used for podman save/load
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db   # resolves to the db service via Compose DNS
      POSTGRES_PORT: 5432  # ALWAYS 5432 — this is the internal container port.
                           # POSTGRES_HOST_PORT in .env only affects the host-side mapping above.
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "8000:8000"
    volumes:
      # Mount the InsightFace buffalo_l weights — copy them here before starting
      - ./models:/app/models:ro
      # Mount templates so edits take effect without a rebuild
      - ./templates:/app/templates:ro
    depends_on:
      db:
        condition: service_healthy  # wait for Postgres to be ready

volumes:
  postgres_data:
    driver: local
